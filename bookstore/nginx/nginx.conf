events { worker_connections 1024; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream auth_svc        { server auth_service:8001        max_fails=3 fail_timeout=10s; }
    upstream catalog_svc     { server catalog_service:8002     max_fails=3 fail_timeout=10s; }
    upstream shop_svc        { server shop_service:8003        max_fails=3 fail_timeout=10s; }
    upstream order_svc       { server order_service:8004       max_fails=3 fail_timeout=10s; }
    upstream interaction_svc { server interaction_service:8005 max_fails=3 fail_timeout=10s; }
    upstream frontend_svc    { server frontend_service:8000    max_fails=3 fail_timeout=10s; }

    server {
        listen 80;
        server_name localhost;
        client_max_body_size 20M;

        # ── API routes ────────────────────────────────────
        location /api/auth/        { proxy_pass http://auth_svc;        include /etc/nginx/proxy_params; }
        location /api/catalog/     { proxy_pass http://catalog_svc;     include /etc/nginx/proxy_params; }
        location /api/shops/       { proxy_pass http://shop_svc;        include /etc/nginx/proxy_params; }
        location /api/orders/      { proxy_pass http://order_svc;       include /etc/nginx/proxy_params; }
        location /api/interactions/{ proxy_pass http://interaction_svc; include /etc/nginx/proxy_params; }

        # ── Admin panels ──────────────────────────────────
        location /admin/ { proxy_pass http://auth_svc; include /etc/nginx/proxy_params; }

        # ── Frontend ──────────────────────────────────────
        location / { proxy_pass http://frontend_svc; include /etc/nginx/proxy_params; }
    }
}
